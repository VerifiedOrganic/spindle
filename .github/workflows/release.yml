name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build binaries for (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p spindle-mcp -p spindle-harness

      - name: Stage archive contents
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          STAGE="spindle-${TAG}-${TARGET}"
          mkdir -p "dist/${STAGE}"

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${TARGET}/release/spindle-mcp.exe"     "dist/${STAGE}/"
            cp "target/${TARGET}/release/spindle-harness.exe" "dist/${STAGE}/"
          else
            cp "target/${TARGET}/release/spindle-mcp"     "dist/${STAGE}/"
            cp "target/${TARGET}/release/spindle-harness" "dist/${STAGE}/"
          fi

          cp LICENSE   "dist/${STAGE}/"
          cp README.md "dist/${STAGE}/"

          echo "stage=${STAGE}" >> "$GITHUB_ENV"

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          tar -czf "${stage}.tar.gz" "${stage}"
          shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          7z a "${stage}.zip" "${stage}" > /dev/null
          sha256sum "${stage}.zip" > "${stage}.zip.sha256"

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            "dist/${stage}.${{ matrix.archive }}" \
            "dist/${stage}.${{ matrix.archive }}.sha256" \
            --clobber
